name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install pygame pyinstaller

      - name: EXE erstellen
        run: pyinstaller --onefile --windowed --name SchiffeversenkenGUI game.py

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: SchiffeversenkenGUI-Windows
          path: dist/SchiffeversenkenGUI.exe
