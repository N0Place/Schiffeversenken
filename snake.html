<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1c1c1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      user-select: none;
      touch-action: none;
    }

    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 12px;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      color: #8e8e93;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
    }

    canvas {
      border-radius: 16px;
      display: block;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #overlay h2 {
      color: #fff;
      font-size: 32px;
      font-weight: 700;
    }

    #overlay p {
      color: #8e8e93;
      font-size: 17px;
    }

    #startBtn {
      margin-top: 8px;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 600;
      background: #30d158;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #startBtn:active { background: #25a244; }

    .wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* D-pad controls */
    #dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 6px;
      margin-top: 20px;
    }

    .dpad-btn {
      width: 64px;
      height: 64px;
      background: #2c2c2e;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active { background: #3a3a3c; }
    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }
  </style>
</head>
<body>

<h1>SNAKE</h1>

<div id="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="best">0</div>
  </div>
</div>

<div class="wrapper">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">Snake</h2>
    <p id="overlayMsg">Swipe or use buttons</p>
    <button id="startBtn">Play</button>
  </div>
</div>

<div id="dpad">
  <button class="dpad-btn" id="btn-up">▲</button>
  <button class="dpad-btn" id="btn-left">◀</button>
  <button class="dpad-btn" id="btn-right">▶</button>
  <button class="dpad-btn" id="btn-down">▼</button>
</div>

<script>
  const canvas  = document.getElementById('c');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const startBtn = document.getElementById('startBtn');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg   = document.getElementById('overlayMsg');

  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;
  const SIZE = CELL * COLS;

  canvas.width  = SIZE;
  canvas.height = SIZE;

  let snake, dir, nextDir, food, score, best, loop, running;

  best = parseInt(localStorage.getItem('snakeBest') || '0');
  bestEl.textContent = best;

  function init() {
    snake   = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir     = {x:1, y:0};
    nextDir = {x:1, y:0};
    score   = 0;
    scoreEl.textContent = 0;
    placeFood();
  }

  function placeFood() {
    do {
      food = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(s => s.x === food.x && s.y === food.y));
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snakeBest', best);
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#1c1c1e';
    ctx.fillRect(0, 0, SIZE, SIZE);

    // grid
    ctx.strokeStyle = '#2c2c2e';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, SIZE); ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(SIZE, j * CELL); ctx.stroke();
    }

    // food
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.fillStyle = '#ff453a';
    ctx.beginPath();
    ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // snake
    snake.forEach((s, i) => {
      const ratio = 1 - (i / snake.length) * 0.4;
      ctx.fillStyle = i === 0 ? '#30d158' : `rgba(48, 209, 88, ${ratio})`;
      roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 5);
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  function gameOver() {
    running = false;
    clearInterval(loop);
    overlayTitle.textContent = 'Game Over';
    overlayMsg.textContent   = `Score: ${score}`;
    startBtn.textContent     = 'Play Again';
    overlay.style.display    = 'flex';
  }

  function startGame() {
    overlay.style.display = 'none';
    init();
    running = true;
    clearInterval(loop);
    loop = setInterval(step, 120);
    draw();
  }

  startBtn.addEventListener('click', startGame);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!running) return;
    const map = {
      ArrowUp:    {x:0,  y:-1},
      ArrowDown:  {x:0,  y:1},
      ArrowLeft:  {x:-1, y:0},
      ArrowRight: {x:1,  y:0},
    };
    const d = map[e.key];
    if (d && !(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
  });

  // D-pad buttons
  function setDir(x, y) {
    if (!running) return;
    if (!(x === -dir.x && y === -dir.y)) nextDir = {x, y};
  }
  document.getElementById('btn-up').addEventListener('click',    () => setDir(0, -1));
  document.getElementById('btn-down').addEventListener('click',  () => setDir(0,  1));
  document.getElementById('btn-left').addEventListener('click',  () => setDir(-1, 0));
  document.getElementById('btn-right').addEventListener('click', () => setDir(1,  0));

  // Swipe
  let tx = 0, ty = 0;
  canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
  canvas.addEventListener('touchend', e => {
    if (!running) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
  }, {passive:true});

  // initial draw
  draw();
</script>
</body>
</html>
